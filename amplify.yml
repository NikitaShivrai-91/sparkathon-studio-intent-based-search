version: 1
backend:
  phases:
    build:
      commands:
        # Install backend dependencies
        - cd backend
        - npm install --registry=https://registry.npmjs.org/
        # Prepare Amplify Hosting Compute structure
        - mkdir -p .amplify-hosting/compute/default
        # Copy all backend files to compute directory
        - cp server.js .amplify-hosting/compute/default/
        - cp bedrock-service.js .amplify-hosting/compute/default/
        - cp package.json .amplify-hosting/compute/default/
        - cp .npmrc .amplify-hosting/compute/default/
        - cp -r node_modules .amplify-hosting/compute/default/
        # Copy mock data from frontend
        - cp ../src/app/shared/data/mock-datamaps.json .amplify-hosting/compute/default/
        # Copy deployment manifest
        - cp deploy-manifest.json .amplify-hosting/
        - echo "Backend compute package created"
        - cd ..
  artifacts:
    baseDirectory: backend/.amplify-hosting
    files:
      - '**/*'
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/acd-studio-datamaps-search-ui/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - backend/node_modules/**/*
