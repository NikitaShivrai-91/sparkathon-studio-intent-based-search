version: 1
backend:
  phases:
    build:
      commands:
        # Install backend dependencies
        - cd backend && npm install
        # Create Lambda deployment package
        - zip -r ../backend-lambda.zip . -x "node_modules/*" ".git/*"
        - cd .. && mkdir -p .amplify-hosting/compute
        - mv backend-lambda.zip .amplify-hosting/compute/default.zip
        - echo "Backend Lambda package created"
frontend:
  phases:
    preBuild:
      commands:
        - npm cache clean --force || true
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/acd-studio-datamaps-search-ui/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - backend/node_modules/**/*
