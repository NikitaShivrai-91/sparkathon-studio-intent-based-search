version: 1
backend:
  phases:
    build:
      commands:
        - (cd backend && npm install)
        - echo "Backend built successfully"
frontend:
  phases:
    preBuild:
      commands:
        - npm cache clean --force || true
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/acd-studio-datamaps-search-ui/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - backend/node_modules/**/*
